name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: file:./dev.db
      RUN_E2E: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Unit and integration tests
        run: npm run test

      - name: Build
        run: npm run build

  e2e-smoke:
    runs-on: ubuntu-latest
    needs: lint-test-build
    timeout-minutes: 20
    env:
      DATABASE_URL: file:./dev.db
      RUN_E2E: "false"
      BASE_URL: http://localhost:3000
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Start app
        run: |
          npm run start &
          for i in {1..30}; do
            if curl -sSf http://localhost:3000 >/dev/null; then
              break
            fi
            sleep 2
          done

      - name: Run E2E test file
        run: npx vitest run tests/e2e/fast-pass-agent-eval.test.ts
