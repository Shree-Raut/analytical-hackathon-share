version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - semantic-postgres
    volumes:
      - ./dev.db:/app/dev.db

  semantic-postgres:
    image: postgres:16
    container_name: semantic-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: semantic_layer_dev
    ports:
      - "5432:5432"
    volumes:
      - semantic_postgres_data:/var/lib/postgresql/data

volumes:
  semantic_postgres_data:
